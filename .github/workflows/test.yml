name: Test

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Install cgo build dependencies
        # scard needs PC/SC headers; systray needs GTK + app-indicator on Linux.
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: Verify cross-compilation (Windows)
        run: GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null .
