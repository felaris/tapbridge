name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Compute next patch version
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "v1.1.0")
          version=${latest#v}
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3)
          new_tag="v${major}.${minor}.$((patch + 1))"
          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "Bumping $latest → $new_tag"

  build-mac:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build — Apple Silicon (arm64)
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -ldflags="-s -w" -o dist/felaris-nfc-bridge-mac-arm64 .

      - name: Build — Intel (amd64)
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -ldflags="-s -w" -o dist/felaris-nfc-bridge-mac-intel .

      - name: Make executables
        run: chmod +x dist/felaris-nfc-bridge-mac-*

      - name: Copy install script
        run: cp install.sh dist/install.sh

      - uses: actions/upload-artifact@v4
        with:
          name: mac-binaries
          path: dist/

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build — Windows x64
        run: |
          $env:CGO_ENABLED = "1"
          $env:CC = "gcc"
          go build -ldflags="-s -w" -o dist\felaris-nfc-bridge-windows.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist\

  release:
    needs: [version, build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-binaries
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: dist/

      - name: Create git tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${{ needs.version.outputs.tag }}" \
            -f sha="${{ github.sha }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Felaris NFC Bridge ${{ needs.version.outputs.tag }}"
          body: |
            ## Felaris NFC Bridge ${{ needs.version.outputs.tag }}

            ### Mac — one-line install (M1 / M2 / M3 / M4 and Intel)

            Open **Terminal** and run:

            ```bash
            curl -fsSL https://github.com/felaris/felaris-nfc-bridge/releases/latest/download/install.sh | bash
            ```

            This handles the macOS security prompt automatically — no Apple Developer account needed.

            ---

            ### Manual download

            If you prefer to download the binary directly, macOS will block it by default.
            After downloading, run this once in Terminal to unblock it:

            ```bash
            xattr -d com.apple.quarantine ~/Downloads/felaris-nfc-bridge-mac-arm64
            chmod +x ~/Downloads/felaris-nfc-bridge-mac-arm64
            ```

            | File | Platform |
            |------|----------|
            | `felaris-nfc-bridge-mac-arm64` | Mac — Apple Silicon (M1 / M2 / M3 / M4) |
            | `felaris-nfc-bridge-mac-intel` | Mac — Intel chip |
            | `felaris-nfc-bridge-windows.exe` | Windows 10 / 11 (64-bit) |

            ---

            ### How to use
            1. Plug in your ACR122U
            2. Run the bridge (`felaris-nfc-bridge` in Terminal, or double-click)
            3. Open Chrome → go to the Orange Health site → NFC tab → Ready to Read
            4. Tap the card
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
